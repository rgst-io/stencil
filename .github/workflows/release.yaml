name: release

on:
  # Only run when triggered through the Github UI or API.
  workflow_dispatch:
    inputs:
      rc:
        description: "Build a release candidate instead of a stable release"
        required: false
        default: false
        type: boolean
      version:
        description: "Set a specific version to release, defaults to automatic versioning based on conventional commits"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  packages: write
  issues: write
  # Used by attestations in the release workflow.
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  # When on VCS providers other than Github (e.g., forgejo), this is
  # used to reflect a Github Token that actually has access to Github,
  # unlike the token provided by act.
  #
  ## <<Stencil::Block(forgejoGithubToken)>>
  REAL_GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_WRITE }}
  ## <</Stencil::Block>>

  # Forgejo's Action token does not have permissions to write to the
  # package registry. For more information, see:
  # https://codeberg.org/forgejo/forgejo/issues/6198
  #
  ## <<Stencil::Block(forgejoPackageToken)>>
  FORGEJO_PACKAGE_TOKEN: ${{ secrets.FORGEJO_PACKAGES_WRITE }}
  ## <</Stencil::Block>>

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      ## <<Stencil::Block(releaseSetup)>>
      - uses: actions/create-github-app-token@v3
        id: github-app
        with:
          # https://github.com/organizations/rgst-io/settings/apps/rgst-io-stencil-homebrew
          client-id: "Iv1.2217d15d6accb480"
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
      - name: import gpg key
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}
        run: gpg --import <<<"$GPG_KEY"

      ## <</Stencil::Block>>
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ env.REAL_GITHUB_TOKEN }}
      - name: Get Go directories
        id: go
        run: |
          echo "cache_dir=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "mod_cache_dir=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.go.outputs.cache_dir }}
          key: ${{ github.workflow }}-${{ runner.os }}-go-build-cache-${{ hashFiles('**/go.sum') }}
      - uses: actions/cache@v5
        with:
          path: ${{ steps.go.outputs.mod_cache_dir }}
          key: ${{ github.workflow }}-${{ runner.os }}-go-mod-cache-${{ hashFiles('go.sum') }}
      - name: Retrieve goreleaser version
        run: |-
          echo "version=$(mise current goreleaser)" >> "$GITHUB_OUTPUT"
        id: goreleaser
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: git.rgst.io
          username: ${{ github.actor }}
          password: ${{ env.FORGEJO_PACKAGE_TOKEN }}
      - name: Set up git user
        uses: fregante/setup-git-user@v2

      # Bumping logic
      - name: Get next version
        id: next_version
        env:
          BUILD_RC: ${{ github.event.inputs.rc }}
          VERSION_OVERRIDE: ${{ github.event.inputs.version }}
        run: |-
          echo "version=$(mise run next-version)" >> "$GITHUB_OUTPUT"
      - name: Create Tag
        run: |-
          git tag -a "${{ steps.next_version.outputs.version }}" -m "Release ${{ steps.next_version.outputs.version }}"
      - name: Generate CHANGELOG
        env:
          GITEA_TOKEN: ${{ github.token }}
        run: |-
          mise run changelog-release
      - name: Create release artifacts and Github Release
        run: |-
          # forgejo's actions implementation sets this automatically,
          # which we do not want.
          unset GITHUB_TOKEN
          goreleaser release --release-notes CHANGELOG.md --clean
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ## <<Stencil::Block(goreleaseEnvVars)>>
          BUILD_RC: ${{ github.event.inputs.rc }}
          FURY_PUSH_TOKEN: ${{ secrets.FURY_PUSH_TOKEN }}
          REAL_GITHUB_TOKEN: ${{ steps.github-app.outputs.token }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          ## <</Stencil::Block>>
